<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <div class="logo">
            <img src="images/logo.png" alt="Logo">
        </div>
        <nav>
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>
    
    <section id="home">
        <h1>Selamat datang di Website Teman!</h1>
        <p>Ini adalah website sederhana dengan desain yang bersih dan profesional.</p>
    </section>
    
    <section id="about">
        <h2>Tentang Website</h2>
        <p>Website ini dibuat untuk teman-teman terdekat, dengan tujuan untuk memberikan informasi dan berbagi konten menarik.</p>
    </section>
    
    <section id="contact">
        <h2>Kontak</h2>
        <form>
            <label for="name">Nama:</label>
            <input type="text" id="name" name="name" required>
            <label for="message">Pesan:</label>
            <textarea id="message" name="message" required></textarea>
            <button type="submit">Kirim</button>
        </form>
    </section>

    <footer>
        <p>&copy; 2026 Website Teman</p>
    </footer>

    <script src="js/scripts.js"></script>
</body>
</html>
