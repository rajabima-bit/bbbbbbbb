<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TemanKita</title>

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- HEADER -->
<header>
    <div class="logo">
        <img src="images/logo.png" alt="logo">
        <span>TemanKita</span>
    </div>

    <nav id="nav">
        <ul>
            <li><a href="#home">Home</a></li>
            <li><a href="#about">Tentang</a></li>
            <li><a href="#contact">Kontak</a></li>
        </ul>
    </nav>

    <!-- Hamburger -->
    <div class="menu-toggle" id="menu-toggle">
        ☰
    </div>
</header>

<!-- HERO -->
<section id="home" class="fade-in">
    <h1>Selamat Datang 👋</h1>
    <p>Platform sederhana untuk berbagi dengan teman sekitar</p>
    <button onclick="scrollToSection('contact')">Hubungi Kami</button>
</section>

<!-- ABOUT -->
<section id="about" class="fade-in">
    <h2>Tentang</h2>
    <p>
        Website ini dibuat untuk menghubungkan teman-teman di sekitar kita.
        Desain clean, cepat, dan mudah digunakan.
    </p>
</section>

<!-- CONTACT -->
<section id="contact" class="fade-in">
    <h2>Kontak</h2>
    <form id="contactForm">
        <input type="text" placeholder="Nama" required>
        <textarea placeholder="Pesan" required></textarea>
        <button type="submit">Kirim</button>
    </form>
</section>

<!-- FOOTER -->
<footer>
    <p>© 2026 TemanKita</p>
</footer>

<script src="js/scripts.js"></script>
</body>
</html>
